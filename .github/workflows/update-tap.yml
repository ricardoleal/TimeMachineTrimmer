name: Update Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override: specific version (leave empty to auto-detect latest)"
        required: false
        type: string
      sha256:
        description: "Override: SHA256 of the DMG (required if version is set)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Determine release to publish
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            SHA256="${{ inputs.sha256 }}"
            echo "Using manual override: v$VERSION"
          else
            echo "Fetching latest release from ricardoleal/TimeMachineTrimmer..."
            RELEASE=$(gh release view --repo ricardoleal/TimeMachineTrimmer --json tagName --jq '.tagName')
            VERSION="${RELEASE#v}"
            echo "Latest release: $RELEASE"
            gh release download "$RELEASE" --repo ricardoleal/TimeMachineTrimmer -p "*.dmg" -O /tmp/app.dmg
            SHA256=$(shasum -a 256 /tmp/app.dmg | cut -d' ' -f1)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: ricardoleal/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}

      - name: Check if cask needs updating
        id: check
        run: |
          CURRENT=$(grep 'version "' Casks/time-machine-trimmer.rb | sed 's/.*"\(.*\)".*/\1/')
          LATEST="${{ steps.release.outputs.version }}"
          echo "Current cask: $CURRENT"
          echo "Target version: $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Cask is already at the latest version. Skipping."
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update cask
        if: steps.check.outputs.updated == 'true'
        run: |
          sed -i '' 's/version ".*"/version "${{ steps.release.outputs.version }}"/' Casks/time-machine-trimmer.rb
          sed -i '' 's/sha256 ".*"/sha256 "${{ steps.release.outputs.sha256 }}"/' Casks/time-machine-trimmer.rb
          echo "--- Updated cask ---"
          cat Casks/time-machine-trimmer.rb

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/time-machine-trimmer.rb
          git commit -m "Update time-machine-trimmer to v${{ steps.release.outputs.version }}"
          git push
