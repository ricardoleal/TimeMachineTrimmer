name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build:
    name: Build and Publish Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tooling
        run: brew install create-dmg

      - name: Install certificates
        env:
          DEV_SIGN_CERT: ${{ secrets.DEV_SIGN_CERT }}
          DEV_SIGN_PW: ${{ secrets.DEV_SIGN_PW }}
        run: |
          DEV_CERT_P12="$RUNNER_TEMP/dev_cert.p12"
          KEYCHAIN_DB="$RUNNER_TEMP/keychain.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_DB"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_DB"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_DB"
          echo -n "$DEV_SIGN_CERT" | base64 --decode -o "$DEV_CERT_P12"
          security import "$DEV_CERT_P12" -P "$DEV_SIGN_PW" -A -t cert -f pkcs12 -k "$KEYCHAIN_DB"
          security list-keychain -d user -s "$KEYCHAIN_DB"

      - name: Build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          xcodebuild archive \
            -project TimeMachineTrimmer.xcodeproj \
            -scheme TimeMachineTrimmer \
            -destination generic/platform=macOS \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/TimeMachineTrimmer.xcarchive" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            CODE_SIGN_STYLE=Manual

      - name: Build Helper
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          HELPER_DIR="PrivilegedHelper"
          SRC_DIR="TimeMachineTrimmer"
          APP_PATH="$RUNNER_TEMP/TimeMachineTrimmer.xcarchive/Products/Applications/TimeMachineTrimmer.app"
          mkdir -p "$APP_PATH/Contents/Library/LaunchServices"
          swiftc \
            -target arm64-apple-macosx14.4 \
            -sdk "$(xcrun --show-sdk-path)" \
            "$HELPER_DIR/main.swift" \
            "$SRC_DIR/Services/HelperProtocol.swift" \
            -o "$APP_PATH/Contents/Library/LaunchServices/TimeMachineTrimmer-helper" \
            -module-name "TMTHelper" \
            -emit-executable \
            -O
          cp "$HELPER_DIR/com.ricardoleal.TimeMachineTrimmer.helper.plist" "$APP_PATH/Contents/Library/LaunchServices/"
          codesign \
            --sign "$CODE_SIGN_IDENTITY" \
            --options=runtime \
            --force --timestamp \
            "$APP_PATH/Contents/Library/LaunchServices/TimeMachineTrimmer-helper"

      - name: Test
        run: |
          swiftc \
            -target arm64-apple-macosx14.4 \
            -sdk "$(xcrun --show-sdk-path)" \
            Tests/*.swift \
            -o /tmp/TimeMachineTrimmer-tests \
            -emit-executable \
            -O
          /tmp/TimeMachineTrimmer-tests

      - name: Sign
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          codesign \
            --sign "$CODE_SIGN_IDENTITY" \
            --options=runtime \
            --force --deep --timestamp \
            --entitlements "TimeMachineTrimmer/TimeMachineTrimmer.entitlements" \
            "$RUNNER_TEMP/TimeMachineTrimmer.xcarchive/Products/Applications/TimeMachineTrimmer.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "TimeMachineTrimmer" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "TimeMachineTrimmer.app" 120 190 \
            --hide-extension "TimeMachineTrimmer.app" \
            --app-drop-link 380 190 \
            --hdiutil-verbose \
            --no-internet-enable \
            "$RUNNER_TEMP/TimeMachineTrimmer.dmg" \
            "$RUNNER_TEMP/TimeMachineTrimmer.xcarchive/Products/Applications/TimeMachineTrimmer.app"

      - name: Publish Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: "${{ github.ref_name }}"
          files: |
            ${{ runner.temp }}/TimeMachineTrimmer.dmg
          prerelease: false
          repo_token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/keychain.keychain-db" 2>/dev/null || true
