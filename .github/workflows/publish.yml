name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -project TimeMachineTrimmer.xcodeproj \
            -scheme TimeMachineTrimmer \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Automatic

      - name: Copy app
        run: |
          mkdir -p build
          cp -R "build/Release/TimeMachineTrimmer.app" build/

      - name: Create DMG
        run: |
          create-dmg \
            --volname "TimeMachineTrimmer" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "TimeMachineTrimmer.app" 120 190 \
            --hide-extension "TimeMachineTrimmer.app" \
            --app-drop-link 380 190 \
            --hdiutil-verbose \
            --no-internet-enable \
            "build/TimeMachineTrimmer.dmg" \
            "build/TimeMachineTrimmer.app"

      - name: Publish release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          automatic_release_tag: ${{ github.ref_name }}
          title: "TimeMachineTrimmer ${{ github.ref_name }}"
          files: |
            build/TimeMachineTrimmer.dmg
