name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install signing certificates
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASS="temp-password"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security import <(echo "${{ secrets.DEV_SIGN_CERT }}" | base64 -d) \
            -f pkcs12 -k "${{ secrets.DEV_SIGN_PW }}" -P "${{ secrets.DEV_SIGN_PW }}" \
            -T /usr/bin/codesign -T /usr/bin/productsign -A "$KEYCHAIN"
          security import <(echo "${{ secrets.MAC_SIGN_CERT }}" | base64 -d) \
            -f pkcs12 -k "${{ secrets.MAC_SIGN_PW }}" -P "${{ secrets.MAC_SIGN_PW }}" \
            -T /usr/bin/codesign -T /usr/bin/productsign -A "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "::add-mask::$KEYCHAIN_PASS"

      - name: Archive
        run: |
          xcodebuild archive \
            -project TimeMachineTrimmer.xcodeproj \
            -scheme TimeMachineTrimmer \
            -configuration Release \
            -archivePath build/TimeMachineTrimmer.xcarchive \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Copy app
        run: |
          mkdir -p build
          cp -R "build/TimeMachineTrimmer.xcarchive/Products/Applications/TimeMachineTrimmer.app" build/

      - name: Sign app
        run: |
          codesign --options=runtime --force --deep --timestamp \
            --sign "${{ secrets.CODE_SIGN_IDENTITY }}" \
            --entitlements "TimeMachineTrimmer/TimeMachineTrimmer.entitlements" \
            "build/TimeMachineTrimmer.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "TimeMachineTrimmer" \
            --volicon "build/TimeMachineTrimmer.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "TimeMachineTrimmer.app" 120 190 \
            --hide-extension "TimeMachineTrimmer.app" \
            --app-drop-link 380 190 \
            --hdiutil-verbose \
            --notarize "${{ secrets.APPLE_ID }}" "${{ secrets.APPLE_ID_PASSWORD }}" "${{ secrets.APPLE_TEAM_ID }}" \
            --no-internet-enable \
            "build/TimeMachineTrimmer.dmg" \
            "build/TimeMachineTrimmer.app"

      - name: Extract build number
        run: |
          BUILD_NUMBER=$(xcrun agvtool vers -terse 2>/dev/null || echo "1")
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Publish release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          automatic_release_tag: ${{ github.ref_name }}
          title: "TimeMachineTrimmer ${{ github.ref_name }}"
          files: |
            build/TimeMachineTrimmer.dmg

      - name: Cleanup
        if: ${{ always() }}
        run: |
          security delete-keychain "build.keychain" 2>/dev/null || true
          rm -rf ~/Library/MobileDevice/ProvisioningProfiles 2>/dev/null || true
